<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --accent-color: #667eea;
            --btn-grad: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center; text-align: center;
        }

        #main-container { z-index: 10; padding: 20px; max-width: 90%; }

        /* Bouncing Cake */
        .cake { font-size: 80px; display: inline-block; animation: bounce 1.5s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #4a5568; margin: 10px 0; }
        .subtitle { font-style: italic; font-weight: 300; color: #2d3748; margin-bottom: 30px; }
        .closing { margin-top: 40px; font-size: 0.9rem; color: #4a5568; opacity: 0.8; }

        /* Buttons */
        .btn-container { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 20px; min-height: 100px; }

        #yes-btn {
            background: var(--btn-grad); color: white; border: none; padding: 15px 45px;
            font-size: 1.2rem; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4); transition: 0.2s; font-weight: bold;
        }
        #yes-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(245, 87, 108, 0.6); }

        #no-btn {
            background: white; color: #f5576c; border: 2px solid #f5576c;
            padding: 10px 25px; font-size: 1rem; border-radius: 50px; cursor: pointer;
        }

        /* Floating Balloons */
        .balloon { position: absolute; bottom: -15%; user-select: none; pointer-events: none; animation: floatUp linear infinite; }
        @keyframes floatUp { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            10% { opacity: 1; } 
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; } 
        }

        /* Celebration Screen */
        #celebration { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .yay-text { font-family: 'Dancing Script', cursive; font-size: 5rem; color: #f5576c; animation: pulse 1s infinite; }
        .spinning-emoji { font-size: 100px; animation: spin 2s linear infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .confetti { position: absolute; width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="cake">🎂</div>
        <h1 id="question">Are you ready for your Birthday treat?</h1>
        <p class="subtitle">I've got something special planned for you...</p>

        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">YES!</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>

        <p class="closing">"Another year older, another year of us being amazing!"</p>
    </div>

    <div id="celebration">
        <div class="spinning-emoji">🥳</div>
        <h2 class="yay-text">Happy Birthday!!</h2>
        <p id="yes-message" style="font-size: 1.5rem;">Let the party begin!</p>
    </div>

    <script>
        // --- URL PARAMETER LOGIC ---
        // Usage: birthday.html?name=JAAN
        const urlParams = new URLSearchParams(window.location.search);
        const bdayName = urlParams.get('name') || "Sweetie";
        
        document.getElementById('question').innerText = `Happy Birthday, ${bdayName}! Ready for your treat?`;

        // --- FLOATING BALLOONS ---
        const emojis = ['🎈', '✨', '🎁', '🥳'];
        function createBalloon() {
            const b = document.createElement('div');
            b.classList.add('balloon');
            b.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            b.style.left = Math.random() * 100 + 'vw';
            b.style.fontSize = Math.random() * 30 + 15 + 'px';
            b.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(b);
            setTimeout(() => { b.remove(); }, 8000);
        }
        let bInterval = setInterval(createBalloon, 500);

        // --- RUNAWAY BUTTON ---
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const phrases = ["Don't be boring!", "Wrong button!", "Are you sure?", "Click the big one!", "Nice try!"];
        let phraseIndex = 0;

        function moveNoButton() {
            const yesRect = yesBtn.getBoundingClientRect();
            let newTop, newLeft;
            do {
                newTop = Math.random() * (window.innerHeight - 80);
                newLeft = Math.random() * (window.innerWidth - 120);
            } while (
                newLeft < yesRect.right + 60 && newLeft + 120 > yesRect.left - 60 && 
                newTop < yesRect.bottom + 60 && newTop + 60 > yesRect.top - 60
            );
            noBtn.style.position = 'fixed';
            noBtn.style.top = newTop + 'px';
            noBtn.style.left = newLeft + 'px';
            noBtn.innerText = phrases[phraseIndex];
            phraseIndex = (phraseIndex + 1) % phrases.length;
        }

        // --- CELEBRATION ---
        function celebrate() {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('celebration').style.display = 'flex';
            clearInterval(bInterval);
            for(let i=0; i<150; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = Math.random() * 100 + 'vh';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.getElementById('celebration').appendChild(confetti);
                confetti.animate([
                    { transform: `translateY(0) rotate(0)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(720deg)`, opacity: 0 }
                ], { duration: Math.random() * 3000 + 2000, iterations: Infinity });
            }
        }
    </script>
</body>
</html>
